services:
  backend:
    build: .
    container_name: openshorts-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - ./output:/app/output
    environment:
      - DB_HOST=${DB_HOST:-192.168.100.103}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-openshorts}
      - DB_USER=${DB_USER:-openshorts}
      - DB_PASSWORD=${DB_PASSWORD:-openshorts}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    ports:
      - "5175:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - ./output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend
